name: fixigo
description: Fixigo - Doorstep Appliance Repair & Resale Platform
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  fl_chart: ^0.65.0
  cached_network_image: ^3.3.0
  smooth_page_indicator: ^1.1.0
  http: ^1.0.0
  image_picker: ^1.0.4
  shared_preferences: ^2.5.5
  google_maps_flutter: ^2.14.2
  geolocator: ^14.0.2
  geocoding: ^5.0.0
  url_launcher: ^6.3.2
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
